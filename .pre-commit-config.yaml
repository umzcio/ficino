repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^infra/postgres/.*\.sql$
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: block-env-files
        name: Block committing .env files
        entry: "Never commit .env files — use .env.example and a secret manager"
        language: fail
        files: ^\.env$|^\.env\.[^\.]+$|(^|/)\.env$
        exclude: ^\.env\.example$|^\.env\.template$

      - id: block-api-keys
        name: Block committing API key patterns
        entry: "Potential API key detected — rotate + remove before committing"
        language: pygrep
        args:
          - '--multiline'
        types: [text]
        exclude: ^\.env\.example$|^.*\.md$|^.*\.yaml$|^.*\.yml$|(^|/)CHANGELOG|(^|/)FICINO_CODE_REVIEW\.md|(^|/)FICINO_REMEDIATION_PLAN\.md
        # Matches sk-ant-api03-…, sk-…, voyage-pa-…, clearly-live formats
        args_pygrep: ['(sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{20,})|(sk-[A-Za-z0-9_-]{32,})|(voyage-pa-[A-Za-z0-9_-]{20,})']
